name: Tests (Playwright + Cucumber)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # กดรันเองได้จากหน้า GitHub Actions

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start backend API (Docker)
        run: |
          docker run -d --rm --name qa-practice-api -p8887:8081 rvancea/qa-practice-api:latest
          echo "รอ API บูต..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8887/api/v1/employees >/dev/null; then
              echo "API พร้อมแล้ว"; break
            fi
            sleep 2
          done

      - name: Run all tests (UI + API)
        run: npx cucumber-js

      - name: Generate HTML report
        if: always() # สร้าง report แม้เทสต์ fail
        run: npm run report

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-html-report
          path: reports/
          retention-days: 30
