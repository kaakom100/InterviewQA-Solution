name: UI Tests (Playwright + Cucumber)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # กดรันเองได้จากหน้า GitHub Actions

jobs:
  ui-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run UI tests
        run: npm run test:ui

      - name: Generate HTML report
        if: always() # สร้าง report แม้เทสต์ fail
        run: npm run report

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-html-report
          path: reports/
          retention-days: 30
